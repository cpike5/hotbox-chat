# thbr.hotboxchat.ca — HTTPS nginx config
#
# Use this config AFTER you have obtained a TLS certificate with certbot.
# See thbr-hotboxchat-http.conf for the initial setup steps.
#
# Install:
#   sudo cp deploy/nginx/thbr-hotboxchat-https.conf /etc/nginx/sites-available/thbr-hotboxchat
#   sudo nginx -t && sudo systemctl reload nginx
#
# Auto-renewal (verify):
#   sudo certbot renew --dry-run

upstream thbr_hotbox_backend {
    server localhost:7200;
}

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name thbr.hotboxchat.ca;

    # TLS certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/thbr.hotboxchat.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thbr.hotboxchat.ca/privkey.pem;

    # Mozilla intermediate TLS configuration
    # https://ssl-config.mozilla.org/#server=nginx&config=intermediate
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # HSTS — uncomment after confirming TLS works correctly
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Proxy to HotBox (Docker)
    location / {
        proxy_pass http://thbr_hotbox_backend;
        proxy_http_version 1.1;

        # WebSocket support (required for SignalR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Timeouts for long-lived SignalR connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# HTTP — redirect to HTTPS + certbot renewal
server {
    listen 80;
    listen [::]:80;
    server_name thbr.hotboxchat.ca;

    # Certbot ACME challenge (must stay on HTTP for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}
