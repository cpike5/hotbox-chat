# HotBox — HTTPS nginx config (static site)
#
# Serves the deployment guide / marketing site from /var/www/hotboxchat.
# Use this config AFTER you have obtained a TLS certificate with certbot.
# See hotbox-http.conf for the initial setup steps.
#
# Install:
#   sudo cp deploy/nginx/hotbox-https.conf /etc/nginx/sites-available/hotbox
#   sudo nginx -t && sudo systemctl reload nginx
#
# Auto-renewal (verify):
#   sudo certbot renew --dry-run

# HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.example.com;

    root /var/www/hotboxchat;
    index index.html;

    # TLS certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/chat.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.example.com/privkey.pem;

    # Mozilla intermediate TLS configuration
    # https://ssl-config.mozilla.org/#server=nginx&config=intermediate
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # HSTS — uncomment after confirming TLS works correctly
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ =404;
    }
}

# HTTP — redirect to HTTPS + certbot renewal
server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;

    # Certbot ACME challenge (must stay on HTTP for renewals)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}
