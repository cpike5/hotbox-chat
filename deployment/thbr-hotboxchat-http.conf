# thbr.hotboxchat.ca — HTTP-only nginx config
#
# Use this config to get started and obtain your first TLS certificate
# from Let's Encrypt via certbot. Once you have a cert, switch to
# thbr-hotboxchat-https.conf.
#
# Install:
#   sudo cp deployment/thbr-hotboxchat-http.conf /etc/nginx/sites-available/thbr-hotboxchat
#   sudo ln -sf /etc/nginx/sites-available/thbr-hotboxchat /etc/nginx/sites-enabled/thbr-hotboxchat
#   sudo mkdir -p /var/www/certbot
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain a certificate:
#   sudo certbot certonly --webroot -w /var/www/certbot -d thbr.hotboxchat.ca

upstream thbr_hotbox_backend {
    server localhost:7200;
}

server {
    listen 80;
    listen [::]:80;
    server_name thbr.hotboxchat.ca;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy to HotBox (Docker)
    location / {
        proxy_pass http://thbr_hotbox_backend;
        proxy_http_version 1.1;

        # WebSocket support (required for SignalR)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward client info
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-lived SignalR connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
