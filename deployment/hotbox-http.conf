# HotBox — HTTP-only nginx config (static site)
#
# Serves the deployment guide / marketing site from /var/www/hotboxchat.
# Use this config to get started and obtain your first TLS certificate
# from Let's Encrypt via certbot. Once you have a cert, switch to
# hotbox-https.conf.
#
# Install:
#   sudo cp deployment/hotbox-http.conf /etc/nginx/sites-available/hotbox
#   sudo ln -sf /etc/nginx/sites-available/hotbox /etc/nginx/sites-enabled/hotbox
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo mkdir -p /var/www/certbot /var/www/hotboxchat
#   sudo cp deployment/index.html /var/www/hotboxchat/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain a certificate:
#   sudo certbot certonly --webroot -w /var/www/certbot -d chat.example.com

server {
    listen 80;
    listen [::]:80;
    server_name chat.example.com;

    root /var/www/hotboxchat;
    index index.html;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
